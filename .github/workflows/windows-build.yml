name: Windows Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  windows-build:
    name: Windows desktop shell build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Compile Tauri desktop shell
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Signed installer gate
        shell: pwsh
        run: |
          if (!(Test-Path src-tauri)) {
            Write-Host "Windows/Tauri source is not present yet."
            Write-Host "BLOCKED: create Windows app source and provide Authenticode/updater signing credentials before installer generation."
            exit 78
          }
          if (-not $env:WINDOWS_SIGNING_CERT_BASE64) {
            Write-Host "BLOCKED: WINDOWS_SIGNING_CERT_BASE64 is required as a repository secret for signed installer builds."
            exit 78
          }
          npm run desktop:build
