name: Android Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  android-build:
    name: Android wrapper build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android shell
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Signed release gate
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d android ]; then
            echo "Android project source is not present yet."
            echo "BLOCKED: create Capacitor/Android source and provide Play/signing credentials before release AAB generation."
            exit 78
          fi
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "BLOCKED: ANDROID_KEYSTORE_BASE64 is required as a repository secret for signed release builds."
            exit 78
          fi
          cd android
          ./gradlew --no-daemon :app:bundleRelease
