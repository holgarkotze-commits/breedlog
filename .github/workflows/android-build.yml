name: Android Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  android-build:
    name: Android wrapper build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android shell
        run: npm run android:sync

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: breedlog-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build release AAB when signing secrets exist
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd android
          ./gradlew --no-daemon :app:bundleRelease

      - name: Note unsigned certification build
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: echo "Signed Android release remains externally blocked by unavailable signing secrets; debug certification artifact was built successfully."
