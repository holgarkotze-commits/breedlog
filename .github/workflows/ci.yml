name: CI

on:
  push:
    branches:
      - main
      - work
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Type-check, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: breedlog
          POSTGRES_PASSWORD: breedlog
          POSTGRES_DB: breedlog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://breedlog:breedlog@localhost:5432/breedlog_test
      NODE_ENV: test
      SESSION_SECRET: ci-test-secret
      ADMIN_PIN: "0000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # package-lock.json now resolves everything from the public npm
      # registry (the Replit-only package-firewall URLs were removed), so no
      # lockfile patching is needed before install.
      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run certification tests
        run: npm run test:cert

      - name: Production build
        run: npm run build

      - name: Push DB schema
        run: npm run db:push
