name: CI

on:
  push:
    branches:
      - main
      - work
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Type-check, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: breedlog
          POSTGRES_PASSWORD: breedlog
          POSTGRES_DB: breedlog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://breedlog:breedlog@localhost:5432/breedlog_test
      NODE_ENV: test
      SESSION_SECRET: ci-test-secret
      ADMIN_PIN: "0000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Fix registry URLs for CI
        run: |
          sed -i 's|http://package-firewall.replit.local/npm|https://registry.npmjs.org|g' package-lock.json
          echo "Registry URLs patched for public CI"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Push DB schema
        run: npm run db:push

      - name: Run unit & integration tests
        run: npm test
